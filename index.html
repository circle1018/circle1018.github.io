<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>세부능력 및 특기사항 다운로드</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fa;
      --surface: #ffffff;
      --text: #172033;
      --muted: #667085;
      --line: #dfe5ee;
      --accent: #2563eb;
      --accent-dark: #1d4ed8;
      --danger: #b42318;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: "Pretendard", "Apple SD Gothic Neo", "Malgun Gothic", system-ui, sans-serif;
    }

    main {
      width: min(900px, calc(100% - 32px));
      margin: 0 auto;
      padding: 48px 0;
    }

    header {
      margin-bottom: 28px;
    }

    .eyebrow {
      margin: 0 0 8px;
      color: var(--accent);
      font-size: 14px;
      font-weight: 700;
    }

    h1 {
      margin: 0;
      font-size: clamp(30px, 5vw, 48px);
      line-height: 1.12;
      letter-spacing: 0;
    }

    .lead {
      max-width: 620px;
      margin: 14px 0 0;
      color: var(--muted);
      font-size: 17px;
      line-height: 1.65;
    }

    .summary {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 0 0 26px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      padding: 7px 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--surface);
      color: var(--muted);
      font-size: 14px;
      font-weight: 600;
    }

    .status {
      margin: 0 0 22px;
      padding: 13px 15px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      color: var(--muted);
      font-size: 14px;
      font-weight: 600;
      line-height: 1.55;
    }

    .status.error {
      border-color: #fecdca;
      color: var(--danger);
      background: #fff6f5;
    }

    .status[hidden] {
      display: none;
    }

    .group {
      margin-top: 28px;
    }

    .group:first-of-type {
      margin-top: 0;
    }

    .group-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 10px;
    }

    h2 {
      margin: 0;
      font-size: 20px;
      letter-spacing: 0;
    }

    .count {
      color: var(--muted);
      font-size: 14px;
      font-weight: 600;
      white-space: nowrap;
    }

    .file-list {
      display: grid;
      gap: 10px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .file {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 14px;
      min-height: 74px;
      padding: 14px 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      box-shadow: 0 1px 2px rgb(15 23 42 / 5%);
    }

    .file-name {
      margin: 0;
      overflow-wrap: anywhere;
      font-size: 16px;
      font-weight: 700;
      line-height: 1.45;
    }

    .file-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 6px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
    }

    .download {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 96px;
      min-height: 42px;
      padding: 10px 14px;
      border-radius: 7px;
      background: var(--accent);
      color: #ffffff;
      font-size: 14px;
      font-weight: 800;
      text-decoration: none;
      transition: background 160ms ease, transform 160ms ease;
    }

    .download:hover {
      background: var(--accent-dark);
      transform: translateY(-1px);
    }

    .download:focus-visible {
      outline: 3px solid rgb(37 99 235 / 26%);
      outline-offset: 2px;
    }

    @media (max-width: 560px) {
      main {
        width: min(100% - 24px, 900px);
        padding: 32px 0;
      }

      .file {
        grid-template-columns: 1fr;
      }

      .download {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <p class="eyebrow">1학년 1학기</p>
      <h1>세부능력 및 특기사항</h1>
      <p class="lead">필요한 자료를 선택해서 다운로드하세요.</p>
    </header>

    <section class="summary" aria-label="파일 요약">
      <span class="pill" id="file-count">파일 0개</span>
      <span class="pill" id="file-size">전체 0 KB</span>
    </section>

    <p class="status" id="status">파일 목록을 불러오는 중입니다.</p>
    <section id="download-list" aria-label="다운로드 목록"></section>
  </main>

  <script>
    const CONFIG = {
      owner: "",
      repo: "",
      branch: "",
      root: ""
    };

    const EXCLUDED_ROOT_FILES = new Set([
      "main.html",
      "index.html",
      "readme.md",
      "license",
      "cname",
      ".gitignore"
    ]);

    const list = document.querySelector("#download-list");
    const count = document.querySelector("#file-count");
    const totalSize = document.querySelector("#file-size");
    const status = document.querySelector("#status");

    const formatSize = (bytes) => {
      if (bytes >= 1024 * 1024) {
        return `${(bytes / 1024 / 1024).toFixed(1)} MB`;
      }
      return `${Math.max(1, Math.round(bytes / 1024))} KB`;
    };

    const encodePath = (path) => path
      .split("/")
      .map((part) => encodeURIComponent(part))
      .join("/");

    const decodePathPart = (part) => {
      try {
        return decodeURIComponent(part);
      } catch {
        return part;
      }
    };

    const normalizePath = (path) => path
      .replace(/\\/g, "/")
      .replace(/^\/+|\/+$/g, "");

    const getExtension = (name) => {
      const dot = name.lastIndexOf(".");
      return dot === -1 ? "FILE" : name.slice(dot + 1).toUpperCase();
    };

    const getName = (path) => path.split("/").pop();

    const getDirectory = (path) => {
      const parts = path.split("/");
      return parts.length > 1 ? parts.slice(0, -1).join("/") : "기타";
    };

    const getTopGroup = (path) => {
      const parts = path.split("/");
      return parts.length > 1 ? parts[0] : "기타";
    };

    const setStatus = (message, isError = false) => {
      status.hidden = false;
      status.textContent = message;
      status.classList.toggle("error", isError);
    };

    const clearStatus = () => {
      status.hidden = true;
      status.textContent = "";
      status.classList.remove("error");
    };

    const inferGitHubInfo = () => {
      const host = location.hostname;
      const isGitHubPages = host.endsWith(".github.io");
      const owner = CONFIG.owner || (isGitHubPages ? host.replace(/\.github\.io$/, "") : "");
      const rawSegments = location.pathname.split("/").filter(Boolean).map(decodePathPart);
      const firstSegmentLooksLikeFile = rawSegments.length === 1 && rawSegments[0].includes(".");
      const inferredRepo = rawSegments.length === 0 || firstSegmentLooksLikeFile
        ? `${owner}.github.io`
        : rawSegments[0];
      const repo = CONFIG.repo || (isGitHubPages ? inferredRepo : "");
      const isUserSite = repo === `${owner}.github.io`;
      const pageParts = isUserSite ? rawSegments : rawSegments.slice(1);
      const inferredRoot = pageParts.length > 1 ? pageParts.slice(0, -1).join("/") : "";
      const root = normalizePath(CONFIG.root || inferredRoot);

      return {
        owner,
        repo,
        branch: CONFIG.branch,
        root
      };
    };

    const fetchJson = async (url) => {
      const response = await fetch(url, {
        headers: {
          Accept: "application/vnd.github+json"
        }
      });

      if (!response.ok) {
        throw new Error(`${response.status} ${response.statusText}`);
      }

      return response.json();
    };

    const getDefaultBranch = async (owner, repo) => {
      const repoInfo = await fetchJson(`https://api.github.com/repos/${owner}/${repo}`);
      return repoInfo.default_branch;
    };

    const loadRepositoryFiles = async () => {
      const info = inferGitHubInfo();

      if (!info.owner || !info.repo) {
        throw new Error("GitHub Pages 주소에서 저장소 정보를 찾을 수 없습니다.");
      }

      const branch = info.branch || await getDefaultBranch(info.owner, info.repo);
      const treeUrl = `https://api.github.com/repos/${info.owner}/${info.repo}/git/trees/${encodeURIComponent(branch)}?recursive=1`;
      const tree = await fetchJson(treeUrl);
      const prefix = info.root ? `${info.root}/` : "";

      return tree.tree
        .filter((item) => item.type === "blob")
        .map((item) => ({
          path: normalizePath(item.path),
          size: item.size || 0
        }))
        .filter((file) => !prefix || file.path.startsWith(prefix))
        .map((file) => ({
          path: prefix ? file.path.slice(prefix.length) : file.path,
          size: file.size
        }))
        .filter((file) => file.path && !file.path.includes("/."))
        .filter((file) => {
          const lower = file.path.toLowerCase();
          return file.path.includes("/") || !EXCLUDED_ROOT_FILES.has(lower);
        })
        .map((file) => ({
          ...file,
          name: getName(file.path),
          group: getTopGroup(file.path),
          directory: getDirectory(file.path)
        }))
        .sort((a, b) => a.path.localeCompare(b.path, "ko"));
    };

    const renderFiles = (files) => {
      list.textContent = "";
      count.textContent = `파일 ${files.length}개`;
      totalSize.textContent = `전체 ${formatSize(files.reduce((sum, file) => sum + file.size, 0))}`;

      if (files.length === 0) {
        setStatus("표시할 파일이 없습니다.", true);
        return;
      }

      clearStatus();

      const groups = files.reduce((result, file) => {
        if (!result[file.group]) {
          result[file.group] = [];
        }
        result[file.group].push(file);
        return result;
      }, {});

      Object.entries(groups).forEach(([group, items]) => {
        const section = document.createElement("section");
        section.className = "group";

        const title = document.createElement("div");
        title.className = "group-title";

        const heading = document.createElement("h2");
        heading.textContent = group;

        const groupCount = document.createElement("span");
        groupCount.className = "count";
        groupCount.textContent = `${items.length}개`;

        const ul = document.createElement("ul");
        ul.className = "file-list";

        items.forEach((file) => {
          const li = document.createElement("li");
          li.className = "file";

          const info = document.createElement("div");

          const name = document.createElement("p");
          name.className = "file-name";
          name.textContent = file.name;

          const meta = document.createElement("div");
          meta.className = "file-meta";

          const extension = document.createElement("span");
          extension.textContent = getExtension(file.name);

          const size = document.createElement("span");
          size.textContent = formatSize(file.size);

          const directory = document.createElement("span");
          directory.textContent = file.directory;

          meta.append(extension, size, directory);
          info.append(name, meta);

          const link = document.createElement("a");
          link.className = "download";
          link.href = encodePath(file.path);
          link.download = file.name;
          link.textContent = "다운로드";
          link.setAttribute("aria-label", `${file.name} 다운로드`);

          li.append(info, link);
          ul.append(li);
        });

        title.append(heading, groupCount);
        section.append(title, ul);
        list.append(section);
      });
    };

    loadRepositoryFiles()
      .then(renderFiles)
      .catch((error) => {
        count.textContent = "파일 0개";
        totalSize.textContent = "전체 0 KB";
        setStatus(`파일 목록을 불러오지 못했습니다. ${error.message}`, true);
      });
  </script>
</body>
</html>
